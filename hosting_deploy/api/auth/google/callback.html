<!DOCTYPE html>
<html>
<head><title>Signing in...</title></head>
<body>
<p>Completing sign-in...</p>
<script>
  // Extract the auth code from the URL
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  
  if (code) {
    // Decode the state to get the origin
    let origin = '';
    try { origin = JSON.parse(atob(state)).origin; } catch(e) {}
    
    if (origin) {
      // Redirect to the real backend callback
      window.location.href = origin + '/api/auth/google/callback?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
    } else {
      document.body.textContent = 'Error: Missing origin';
    }
  } else {
    const error = params.get('error');
    document.body.textContent = 'Auth error: ' + (error || 'unknown');
  }
</script>
</body>
</html>
