name: EAS Build (iOS & Android)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }})
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install

      - name: Debug - List Xcode schemes
        run: |
          echo "=== xcodeproj schemes ==="
          xcodebuild -project ios/App/App.xcodeproj -list 2>&1 || true
          echo "=== xcworkspace schemes ==="
          xcodebuild -workspace ios/App/App.xcworkspace -list 2>&1 || true
          echo "=== Scheme files ==="
          find ios -name "*.xcscheme" -type f 2>/dev/null || true

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build app
        run: eas build --platform ${{ github.event.inputs.platform }} --profile ${{ github.event.inputs.profile }} --non-interactive
