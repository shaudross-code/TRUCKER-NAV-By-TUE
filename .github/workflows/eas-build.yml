name: EAS Build (iOS & Android)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform }})
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        run: git clone --depth 1 https://github.com/${{ github.repository }}.git .
        shell: bash

      - name: Setup Node.js 24
        run: |
          curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install 24
          nvm use 24
          echo "$NVM_DIR/versions/node/$(nvm current)/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install dependencies
        run: yarn install
        shell: bash

      - name: Debug - List Xcode schemes
        run: |
          echo "=== xcodeproj schemes ==="
          xcodebuild -project ios/App/App.xcodeproj -list 2>&1 || true
          echo "=== xcworkspace schemes ==="
          xcodebuild -workspace ios/App/App.xcworkspace -list 2>&1 || true
          echo "=== Scheme files ==="
          find ios -name "*.xcscheme" -type f 2>/dev/null || true
        shell: bash

      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest
        shell: bash

      - name: Build app
        run: eas build --platform ${{ github.event.inputs.platform }} --profile ${{ github.event.inputs.profile }} --non-interactive
        shell: bash
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
